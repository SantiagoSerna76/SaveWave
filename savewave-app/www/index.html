<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://savewave.com/?native=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveWave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #11111b; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #fff; }
        .wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { text-align: center; max-width: 320px; }
        .logo { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: #fff; box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
        .sub { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 24px; }
        .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 12px; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; box-shadow: 0 6px 20px rgba(99,102,241,0.3); }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fallback { display: none; }
    </style>
</head>
<body>
    <div class="wrap" id="main">
        <div class="card">
            <div class="logo">S</div>
            <h1>SaveWave</h1>
            <p class="sub" id="status">Conectando...</p>
            <div class="spinner" id="spinner"></div>
            <div class="fallback" id="fallback">
                <a class="btn btn-primary" href="https://savewave.com/?native=1" target="_blank" rel="noopener">Abrir SaveWave</a>
            </div>
        </div>
    </div>
    <script>
        // Intentar redirect
        setTimeout(function() {
            var s = document.getElementById('status');
            var sp = document.getElementById('spinner');
            var fb = document.getElementById('fallback');
            s.textContent = '¿Conexión lenta?';
            sp.style.display = 'none';
            fb.style.display = 'block';
        }, 5000);
        window.location.replace('https://savewave.com/?native=1');
    </script>
</body>
</html>
