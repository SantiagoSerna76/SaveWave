<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaveWave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #11111b;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #11111b;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash.hide {
            opacity: 0;
            pointer-events: none;
        }
        .splash-inner {
            text-align: center;
        }
        .splash-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 10px 30px rgba(99,102,241,0.3);
        }
        .splash-title {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .splash-sub {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="splash-inner">
            <div class="splash-logo">S</div>
            <div class="splash-title">SaveWave</div>
            <div class="splash-sub">Cargando...</div>
            <div class="spinner"></div>
        </div>
    </div>
    <iframe src="https://savewave.com/?native=1" id="webview"></iframe>
    <script>
        const splash = document.getElementById('splash');
        const iframe = document.getElementById('webview');
        
        // Ocultar splash cuando el iframe cargue
        iframe.onload = function() {
            splash.classList.add('hide');
            setTimeout(() => splash.style.display = 'none', 500);
        };
        
        // Timeout: si después de 10 segundos no cargó, ocultar splash igual
        setTimeout(() => {
            splash.classList.add('hide');
            setTimeout(() => splash.style.display = 'none', 500);
        }, 10000);
    </script>
</body>
</html>
