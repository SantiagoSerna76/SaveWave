<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaveWave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #11111b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        .loader {
            text-align: center;
        }
        .loader img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(99,102,241,0.3);
        }
        .loader h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .loader p {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        // Detectar si estamos en la app nativa Capacitor
        const isNative = () => {
            return typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform();
        };

        // Cargar la app principal
        window.onload = function() {
            // Redirigir a la web principal con un parámetro que indica que es app nativa
            // La app nativa cargará la web pero con el flag ?native=1
            const baseUrl = 'https://savewave.com';
            const targetUrl = baseUrl + '?native=1';
            
            // Si estamos en Capacitor, usar el Browser o cargar en WebView
            if (isNative()) {
                window.location.href = targetUrl;
            } else {
                window.location.href = targetUrl;
            }
        };
    </script>
</head>
<body>
    <div class="loader">
        <img src="https://savewave.com/static/Savewave.png" alt="SaveWave">
        <h1>SaveWave</h1>
        <p>Cargando...</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
