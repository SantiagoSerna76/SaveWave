<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://savewave.com/?native=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveWave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #11111b; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
        .splash { text-align: center; }
        .logo { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: #fff; box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="splash">
        <div class="logo">S</div>
        <h1>SaveWave</h1>
        <p>Cargando...</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
