{% extends "base.html" %}

{% block title %}Recuperar Contraseña - SaveWave{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x text-primary mb-3"></i>
                    <h3>Recuperar cuenta</h3>
                    <p class="text-muted">Ingresa tu número de teléfono para recibir un código SMS y cambiar tu contraseña.</p>
                </div>

                <div id="step1">
                    <div class="mb-3">
                        <label class="form-label">Número con código de país (ej. +34600...)</label>
                        <input type="tel" id="phoneNumber" class="form-control" placeholder="+1234567890">
                    </div>
                    <div id="recaptcha-container" class="mb-3 d-flex justify-content-center"></div>
                    <button type="button" class="btn btn-primary w-100 py-2" id="btnSendSMS">
                        <i class="fas fa-paper-plane me-2"></i>Enviar SMS
                    </button>
                </div>

                <div id="step2" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">Código de 6 dígitos</label>
                        <input type="text" id="smsCode" class="form-control" placeholder="123456">
                    </div>
                    <button type="button" class="btn btn-success w-100 py-2" id="btnVerifyCode">
                        <i class="fas fa-check me-2"></i>Verificar Código
                    </button>
                </div>

                <div id="step3" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">Nueva Contraseña</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="button" class="btn btn-danger w-100 py-2" id="btnResetPassword">
                        <i class="fas fa-save me-2"></i>Guardar Contraseña
                    </button>
                </div>

                <div class="text-center mt-3">
                    <p class="mb-0">
                        <a href="{{ url_for('login') }}" class="text-primary fw-bold">
                            <i class="fas fa-arrow-left me-1"></i> Volver a Iniciar sesión
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "{{ config.FIREBASE_API_KEY }}",
    authDomain: "{{ config.FIREBASE_AUTH_DOMAIN }}",
    projectId: "{{ config.FIREBASE_PROJECT_ID }}",
    storageBucket: "{{ config.FIREBASE_STORAGE_BUCKET }}",
    messagingSenderId: "{{ config.FIREBASE_MESSAGING_SENDER_ID }}",
    appId: "{{ config.FIREBASE_APP_ID }}"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  auth.useDeviceLanguage();

  let confirmationResult = null;
  let verifiedToken = null;

  // Init Recaptcha
  window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    'size': 'normal',
    'callback': (response) => {}
  });
  window.recaptchaVerifier.render();

  document.getElementById('btnSendSMS').addEventListener('click', () => {
      const phoneNumber = document.getElementById('phoneNumber').value;
      if (!phoneNumber) return alert("Ingresa un número");
      
      const appVerifier = window.recaptchaVerifier;
      signInWithPhoneNumber(auth, phoneNumber, appVerifier)
          .then((result) => {
              confirmationResult = result;
              document.getElementById('step1').classList.add('d-none');
              document.getElementById('step2').classList.remove('d-none');
          }).catch((error) => {
              console.error(error);
              alert("Error al enviar SMS. Revisa el numero (debe incluir código de país).");
              window.recaptchaVerifier.render().then(function(widgetId) {
                grecaptcha.reset(widgetId);
              });
          });
  });

  document.getElementById('btnVerifyCode').addEventListener('click', () => {
      const code = document.getElementById('smsCode').value;
      confirmationResult.confirm(code).then((result) => {
          result.user.getIdToken().then((token) => {
              verifiedToken = token;
              document.getElementById('step2').classList.add('d-none');
              document.getElementById('step3').classList.remove('d-none');
          });
      }).catch((error) => {
          alert("Código incorrecto");
      });
  });

  document.getElementById('btnResetPassword').addEventListener('click', () => {
      const newPassword = document.getElementById('newPassword').value;
      if (newPassword.length < 6) return alert("La contraseña es muy corta");
      
      fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ token: verifiedToken, new_password: newPassword })
      }).then(res => res.json()).then(data => {
          if(data.success) {
              alert("Contraseña actualizada correctamente. Inicia sesión.");
              window.location.href = "{{ url_for('login') }}";
          } else {
              alert("Error: " + data.error);
          }
      });
  });
</script>
{% endblock %}
